<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assume ton Hot Game</title>
    <style>
        :root { --bg: #0f0c29; --chill: #3498db; --spicy: #e67e22; --xrated: #e74c3c; --accent: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 25px; text-align: center; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        
        .phase { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input { width: 80%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 10px; font-size: 1rem; outline: none; background: rgba(255,255,255,0.9); color: #333; }
        button { cursor: pointer; border: none; border-radius: 12px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        
        .btn-main { background: var(--accent); color: #000; padding: 12px 25px; font-size: 1rem; width: 100%; margin-top: 10px; }
        .btn-temp { width: 100%; padding: 18px; margin: 10px 0; color: white; font-size: 1.2rem; letter-spacing: 1px; }
        
        #player-list { list-style: none; padding: 0; margin: 15px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .player-tag { background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); }
        
        #display-card { font-size: 1.4rem; min-height: 140px; margin: 20px 0; display: block; text-align: center; color: #fff; line-height: 1.8; padding: 10px; }
        #display-card b { color: var(--accent); display: inline-block; padding: 0 5px; }

        .turn-info { color: var(--accent); font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .game-btns { display: flex; gap: 15px; }
        .game-btns button { flex: 1; padding: 20px; background: transparent; border: 2px solid white; color: white; font-size: 1rem; }
        #next-btn { background: #2ecc71; color: white; margin-top: 10px; display: none; padding: 15px; width: 100%; font-size: 1.1rem; }
        .reset-link { display: block; margin-top: 25px; color: rgba(255,255,255,0.4); font-size: 0.8rem; text-decoration: underline; background: none; border: none; width: 100%; }
        
        /* Modal Rejoindre */
        #join-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,12,41,0.95); z-index:100; padding-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div id="phase-intro" class="phase active">
        <span style="font-size: 3rem;">🌶️</span>
        <h2>Flashpoint Online</h2>
        <button class="btn-main" onclick="showCreate()">CRÉER UNE PARTIE</button>
        <button class="btn-main" style="background:#34495e; color:white;" onclick="showJoin()">REJOINDRE</button>
    </div>

    <div id="phase-lobby" class="phase">
        <h2 id="room-display" style="color:var(--accent)">CODE : ----</h2>
        <p>Joueurs connectés :</p>
        <ul id="player-list"></ul>
        <button id="start-btn" class="btn-main" style="display:none; background: #2ecc71;" onclick="goToTemp()">Choisir la température</button>
    </div>

    <div id="phase-temp" class="phase">
        <h2>Température ?</h2>
        <button class="btn-temp" style="background:var(--chill)" onclick="startGame('chill')">❄️ Chill</button>
        <button class="btn-temp" style="background:var(--spicy)" onclick="startGame('spicy')">🔥 Spicy</button>
        <button class="btn-temp" style="background:var(--xrated)" onclick="startGame('xrated')">🔞 X-Rated</button>
    </div>

    <div id="phase-game" class="phase">
        <div id="turn-name" class="turn-info"></div>
        <div id="display-card">Préparez-vous...</div>
        <div id="choice-buttons" class="game-btns">
            <button onclick="playSync('truth')">VÉRITÉ</button>
            <button onclick="playSync('dare')">ACTION</button>
        </div>
        <button id="next-btn" onclick="nextTurnSync()">SUIVANT ⏭️</button>
    </div>
</div>

<div id="join-modal">
    <div style="padding:30px; text-align:center;">
        <h3>Rejoindre un salon</h3>
        <input type="text" id="join-code" placeholder="CODE DU SALON" style="text-transform:uppercase;">
        <input type="text" id="join-name" placeholder="Ton prénom">
        <button class="btn-main" onclick="joinGame()">VALIDER</button>
        <button onclick="document.getElementById('join-modal').style.display='none'" class="reset-link">Annuler</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC43L82InbAIjjZCLjyDjj7vNXcuZ6FURU",
        authDomain: "hotgame-477a8.firebaseapp.com",
        databaseURL: "https://hotgame-477a8-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hotgame-477a8",
        storageBucket: "hotgame-477a8.firebasestorage.app",
        messagingSenderId: "136539996898",
        appId: "1:136539996898:web:c5fbe02545d5cfc90614bb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let roomID = "";
    let isHost = false;
    let players = [];
    let myName = "";

    const database = {
        chill: {
            truth: ["Qualité la plus sexy ?", "Premier baiser c'était où ?", "Ton crush célèbre ?"],
            dare: ["Massage des mains à [X].", "Compliment osé à [X].", "Enlève tes chaussures."]
        },
        spicy: {
            truth: ["Où aimes-tu être embrassé(e) ?", "Tenue irrésistible ?", "As-tu déjà simulé ?"],
            dare: ["Embrasse le cou de [X].", "Enlève un vêtement.", "Mange sensuellement."]
        },
        xrated: {
            truth: ["Fantasme inavouable ?", "Ta position préférée ?", "Lieu le plus insolite ?"],
            dare: ["Isole-toi avec [X] (1 min).", "Lapdance à [X].", "Lèche l'oreille de [X]."]
        }
    };

    window.showCreate = async function() {
        roomID = Math.random().toString(36).substring(2, 6).toUpperCase();
        isHost = true;
        myName = prompt("Ton prénom :");
        if(!myName) return;
        await set(ref(db, 'rooms/' + roomID), {
            status: "lobby",
            players: { [myName]: true },
            currentText: "En attente...",
            turnIndex: 0
        });
        setupLobby(roomID);
    };

    window.showJoin = () => document.getElementById('join-modal').style.display = 'block';

    window.joinGame = async function() {
        const code = document.getElementById('join-code').value.toUpperCase();
        myName = document.getElementById('join-name').value.trim();
        if(code && myName) {
            const snapshot = await get(ref(db, 'rooms/' + code));
            if(snapshot.exists()) {
                await update(ref(db, `rooms/${code}/players`), { [myName]: true });
                roomID = code;
                setupLobby(code);
                document.getElementById('join-modal').style.display = 'none';
            } else { alert("Code inexistant !"); }
        }
    };

    function setupLobby(code) {
        document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
        document.getElementById('phase-lobby').classList.add('active');
        document.getElementById('room-display').innerText = "CODE : " + code;

        onValue(ref(db, 'rooms/' + code), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            players = Object.keys(data.players);
            document.getElementById('player-list').innerHTML = players.map(p => `<li class="player-tag">${p}</li>`).join('');
            
            if(isHost && players.length >= 2) document.getElementById('start-btn').style.display = 'block';

            if(data.status === "temp") {
                showPhase('phase-temp');
            } else if(data.status === "playing") {
                showPhase('phase-game');
                document.getElementById('display-card').innerHTML = data.currentText;
                document.getElementById('turn-name').innerText = "Tour de : " + players[data.turnIndex];
                
                // Gestion affichage boutons
                if(data.currentText.includes("Alors...")) {
                    document.getElementById('choice-buttons').style.display = "flex";
                    document.getElementById('next-btn').style.display = "none";
                } else {
                    document.getElementById('choice-buttons').style.display = "none";
                    if(isHost) document.getElementById('next-btn').style.display = "block";
                }
            }
        });
    }

    function showPhase(id) {
        document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    window.goToTemp = () => update(ref(db, 'rooms/' + roomID), { status: "temp" });

    window.startGame = (level) => {
        update(ref(db, 'rooms/' + roomID), { 
            status: "playing", 
            level: level,
            currentText: "Alors... <br>Action ou Vérité ?"
        });
    };

    window.playSync = async function(type) {
        if(!isHost) return;
        const snap = await get(ref(db, 'rooms/' + roomID));
        const data = snap.val();
        const pool = database[data.level][type];
        let text = pool[Math.floor(Math.random() * pool.length)];

        if (text.includes("[X]")) {
            let others = players.filter(p => p !== players[data.turnIndex]);
            let target = others[Math.floor(Math.random() * others.length)];
            text = text.replace("[X]", `<b>${target}</b>`);
        }
        update(ref(db, 'rooms/' + roomID), { currentText: text });
    };

    window.nextTurnSync = async function() {
        const snap = await get(ref(db, 'rooms/' + roomID));
        const newIndex = (snap.val().turnIndex + 1) % players.length;
        update(ref(db, 'rooms/' + roomID), { 
            turnIndex: newIndex, 
            currentText: "Alors... <br>Action ou Vérité ?" 
        });
    };
</script>
</body>
</html>
