<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assume ton Hot Game</title>
    <style>
        :root { --bg: #0f0c29; --chill: #3498db; --spicy: #e67e22; --xrated: #e74c3c; --accent: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 25px; text-align: center; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        
        .phase { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input { width: 80%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 10px; font-size: 1rem; outline: none; background: rgba(255,255,255,0.9); }
        button { cursor: pointer; border: none; border-radius: 12px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        
        .btn-main { background: var(--accent); color: #000; padding: 12px 25px; font-size: 1rem; width: 100%; margin-top: 10px; }
        .btn-temp { width: 100%; padding: 18px; margin: 10px 0; color: white; font-size: 1.2rem; letter-spacing: 1px; }
        
        #player-list { list-style: none; padding: 0; margin: 15px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .player-tag { background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); }
        
        #display-card { 
        font-size: 1.4rem; 
        min-height: 140px; 
        margin: 20px 0; 
        display: block; /* Important : on enlève le 'flex' qui créait le bug */
        text-align: center; 
        color: #fff; 
        line-height: 1.8; /* Donne un peu d'air entre les lignes */
        padding: 10px;
}

/* Ajoute ça juste en dessous pour que le nom soit bien intégré */
#display-card b {
    color: var(--accent);
    display: inline-block;
    padding: 0 5px;
}
        .turn-info { color: var(--accent); font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .game-btns { display: flex; gap: 15px; }
        .game-btns button { flex: 1; padding: 20px; background: transparent; border: 2px solid white; color: white; font-size: 1rem; }
        .game-btns button:active { background: white; color: black; }

        #next-btn { background: #2ecc71; color: white; margin-top: 10px; display: none; padding: 15px; width: 100%; font-size: 1.1rem; }
        
        .reset-link { display: block; margin-top: 25px; color: rgba(255,255,255,0.4); font-size: 0.8rem; text-decoration: underline; background: none; border: none; width: 100%; }
        .chili-icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="phase-reg" class="phase active">
        <span class="chili-icon">🌶️</span>
        <h2>Action ou Vérité Hot</h2>
        <input type="text" id="name-input" placeholder="Prénom du joueur...">
        <button class="btn-main" onclick="addPlayer()">Ajouter</button>
        <ul id="player-list"></ul>
        <button id="start-btn" class="btn-main" style="display:none; background: #2ecc71;" onclick="goToTemp()">Suivant (Température)</button>
    </div>

    <div id="phase-temp" class="phase">
        <h2>Choisissez l'ambiance</h2>
        <button class="btn-temp" style="background:var(--chill)" onclick="startGame('chill')">❄️ Chill</button>
        <button class="btn-temp" style="background:var(--spicy)" onclick="startGame('spicy')">🔥 Spicy</button>
        <button class="btn-temp" style="background:var(--xrated)" onclick="startGame('xrated')">🔞 X-Rated</button>
        <button class="reset-link" onclick="location.reload()">⬅️ Retour à l'accueil</button>
    </div>

    <div id="phase-game" class="phase">
        <div id="turn-name" class="turn-info"></div>
        
        <div id="display-card">Préparez-vous...</div>
        
        <div id="choice-buttons" class="game-btns">
            <button onclick="play('truth')">VÉRITÉ</button>
            <button onclick="play('dare')">ACTION</button>
        </div>

        <button id="next-btn" onclick="prepareNextTurn()">SUIVANT ⏭️</button>

        <button class="reset-link" onclick="goToTemp()">🔥 Changer de température (Début)</button>
    </div>
</div>

<script>
    let players = [];
    let currentLevel = "";
    let currentPlayerIndex = 0;

    const database = {
        chill: {
            truth: ["Quelle est ta qualité la plus sexy ?", "Ton premier baiser, c'était où ?", "Qui est ton crush célèbre ?"],
            dare: ["Fais un massage des mains à [X].", "Fais un compliment osé à [X].", "Enlève tes chaussures."]
        },
        spicy: {
            truth: ["Où aimes-tu être embrassé(e) ?", "Quelle tenue trouves-tu irrésistible ?", "As-tu déjà simulé ?"],
            dare: ["Embrasse le cou de [X] pendant 10s.", "Enlève un vêtement.", "Mange un aliment de façon sensuelle."]
        },
        xrated: {
            truth: ["Ton fantasme le plus inavouable ?", "Ta position préférée ?", "Le lieu le plus insolite où tu l'as fait ?"],
            dare: ["Isole-toi avec [X] et envoyez-vous une nude.", "Fais un lapdance à [X].", "Lèche le lobe de l'oreille de [X].", "Retire un vêtement à [X] avec les dents."]
        }
    };

    function addPlayer() {
        const input = document.getElementById('name-input');
        const name = input.value.trim();
        if (name !== "") {
            players.push(name);
            const li = document.createElement('li');
            li.className = 'player-tag';
            li.innerText = name;
            document.getElementById('player-list').appendChild(li);
            input.value = "";
            if (players.length >= 2) document.getElementById('start-btn').style.display = "block";
        }
    }

    function goToTemp() {
        // Masque tout et affiche la phase de température
        document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
        document.getElementById('phase-temp').classList.add('active');
    }

    function startGame(level) {
        currentLevel = level;
        document.getElementById('phase-temp').classList.remove('active');
        document.getElementById('phase-game').classList.add('active');
        displayTurnPrompt();
    }

    function displayTurnPrompt() {
        const name = players[currentPlayerIndex];
        document.getElementById('turn-name').innerText = "C'est au tour de " + name;
        document.getElementById('display-card').innerHTML = "Alors... <br>Action ou Vérité ?";
        document.getElementById('choice-buttons').style.display = "flex";
        document.getElementById('next-btn').style.display = "none";
    }

    function play(type) {
        const pool = database[currentLevel][type];
        let text = pool[Math.floor(Math.random() * pool.length)];
        
        if (text.includes("[X]")) {
            let otherPlayers = players.filter((_, i) => i !== currentPlayerIndex);
            let target = otherPlayers[Math.floor(Math.random() * otherPlayers.length)];
            text = text.replace("[X]", `<b style="color:var(--accent)">${target}</b>`);
        }

        document.getElementById('display-card').innerHTML = text;
        document.getElementById('choice-buttons').style.display = "none";
        document.getElementById('next-btn').style.display = "block";
    }

    function prepareNextTurn() {
        // Alterne le joueur et revient à l'écran de choix
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        displayTurnPrompt();
    }
</script>

</body>
</html>
